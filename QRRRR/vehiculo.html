<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Información del vehículo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#252525;--border2:#2e2e2e;--text:#f0ece4;--muted:#777;--accent:#d4ff5c;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);}
  .page{max-width:480px;margin:0 auto;padding:2rem 1.25rem 4rem;}
  .header{margin-bottom:2rem;animation:fadeUp 0.5s ease both;}
  .badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border2);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--mono);letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .vehicle-hero{display:flex;align-items:center;gap:1rem;}
  .vehicle-emoji{font-size:52px;line-height:1;}
  .vehicle-name{font-size:26px;font-weight:500;letter-spacing:-0.02em;line-height:1.1;}
  .vehicle-plate{font-size:14px;font-family:var(--mono);color:var(--accent);letter-spacing:0.1em;margin-top:4px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;animation:fadeUp 0.5s ease both;}
  .card:nth-child(2){animation-delay:0.05s;}.card:nth-child(3){animation-delay:0.1s;}.card:nth-child(4){animation-delay:0.15s;}.card:nth-child(5){animation-delay:0.2s;}
  .card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .card-icon{font-size:14px;opacity:0.6;}.card-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-family:var(--mono);color:var(--muted);}
  .card-body{padding:0;}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);}
  .info-row:last-child{border-bottom:none;}
  .info-key{font-size:12px;font-family:var(--mono);letter-spacing:0.06em;color:var(--muted);}
  .info-val{font-size:14px;text-align:right;max-width:65%;}
  .info-val.mono{font-family:var(--mono);font-size:13px;}.info-val.accent{color:var(--accent);}
  .notes-block{padding:14px 16px;font-size:14px;line-height:1.7;color:var(--muted);font-style:italic;}
  .footer{margin-top:3rem;text-align:center;font-size:11px;font-family:var(--mono);color:var(--border2);letter-spacing:0.06em;}
  .footer span{color:var(--accent);}
  .not-found{text-align:center;padding:4rem 2rem;}
  .not-found-icon{font-size:48px;opacity:0.2;margin-bottom:1rem;}
  .not-found-title{font-size:18px;font-weight:300;color:var(--muted);}
  .not-found-sub{font-size:12px;color:var(--border2);font-family:var(--mono);margin-top:8px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border);max-width:480px;margin:0 auto;opacity:0.5;}
  .topbar-logo{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--muted);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="topbar"><span class="topbar-logo">FLEETQR</span><span class="topbar-logo" id="ts"></span></div>
<div class="page" id="content"><div class="not-found"><div class="not-found-icon">🔍</div><div class="not-found-title">Cargando...</div></div></div>
<script>
const VD=[
  {
    "id": "v_1777727620338",
    "name": "GLA 200",
    "type": "🚐",
    "brand": "M. BENZ",
    "model": "GLA 200 2019",
    "year": "2019",
    "plate": "AABD733",
    "color": "GRIS",
    "vin": "WDCTG4DB7KJ603028",
    "notes": "- Motor 1.6L turbo nafta \n- ⁠Caja 7G-DCT (doble embrague) automática \n- ⁠Tracción delantera (FWD) \n- ⁠Asientos eléctricos en cuero \n-10-12 km/L\n-50 litros \n-8.1 0 a 100 \n- ⁠Volante multifunción \n- ⁠Sensores de estacionamiento \n- ⁠Cámara de retroceso",
    "customs": {
      "PRECIO FINANCIADO": "27.000USD",
      "PRECIO CONTADO": "21.500USD",
      "KILOMETRAJE": "48.000KM"
    },
    "created": "2/5/2026"
  },
  {
    "id": "v_1777733428006",
    "name": "LC GR SPORT",
    "type": "🚐",
    "brand": "TOYOTA",
    "model": "LAND CRUISER GR SPORT",
    "year": "2026",
    "plate": "",
    "color": "NEGRO",
    "vin": "JTMAC7BJ6S4000932",
    "notes": "HIBRIDO HEV \nMOTOR 3.5-TWIN TURBO NAFTA-415 HP\nAutomática de 10 velocidades\n4X4 PERMANENTE \n6-8 km/L\n110 litros \n6.7s 100km",
    "customs": {
      "PRECIO CONTADO": "150.000USD",
      "PRECIO LISTA": "168.000USD",
      "KILOMETRAJE": "0"
    },
    "created": "2/5/2026"
  },
  {
    "id": "v_1777895269368",
    "name": "X5 XDRIVE25D",
    "type": "🚐",
    "brand": "BMW",
    "model": "X5 XDRIVE25D",
    "year": "2021",
    "plate": "AAFU567",
    "color": "NEGRO",
    "vin": "WBACV4100M9E41164",
    "notes": "- 2.0L turbodiésel\n- ⁠Caja 8va automática\n- ⁠Tracción xDrive AWD integral\n- ⁠Modos de manejo: Eco Pro / Comfort / Sport / Adaptive\n- ⁠Asientos eléctricos en cuero\n- ⁠Iluminación ambiental LED\n- ⁠Sensores de estacionamiento y cámara\n- ⁠Techo panorámico",
    "customs": {
      "precio contado": "55,000usd",
      "precio lista": "60.000usd 36 meses",
      "kilometraje": "70.000km"
    },
    "created": "4/5/2026"
  },
  {
    "id": "v_1777898806306",
    "name": "porsche cayenne 2012",
    "type": "🚐",
    "brand": "porsche",
    "model": "cayenne",
    "year": "2012",
    "plate": "",
    "color": "GRIS",
    "vin": "",
    "notes": "3.0L V6 turbodiésel  - \n- caja 8va automatica - \n- ⁠Tracción AWD (integral permanente) - \n- 8 – 11 km/L - \n- capacidad 100 litros -",
    "customs": {
      "precio contado": "25.000usd",
      "precio lista": "28.000usd",
      "kilometraje": "126.000km"
    },
    "created": "4/5/2026"
  }
];
document.getElementById('ts').textContent=new Date().toLocaleString('es-PY',{dateStyle:'short',timeStyle:'short'});
function gp(n){return new URLSearchParams(window.location.search).get(n);}
function render(){
  const id=gp('id'),el=document.getElementById('content');
  if(!id){el.innerHTML=nf('Sin ID','Esta URL no tiene un ID válido.');return;}
  const v=VD.find(x=>x.id===id);
  if(!v){el.innerHTML=nf('No encontrado','ID: '+id);return;}
  const cr=Object.entries(v.customs||{}).map(([k,val])=>'<div class="info-row"><span class="info-key">'+k.toUpperCase()+'</span><span class="info-val">'+val+'</span></div>').join('');
  const mf=[[v.brand,'MARCA',''],[v.model,'MODELO',''],[v.year,'AÑO',''],[v.plate,'PLACA','mono accent'],[v.color,'COLOR',''],[v.vin,'VIN / CHASIS','mono']].filter(x=>x[0]);
  el.innerHTML='<div class="header"><div class="badge"><span class="badge-dot"></span>Información verificada</div><div class="vehicle-hero"><div class="vehicle-emoji">'+(v.type||'🚗')+'</div><div><div class="vehicle-name">'+v.name+'</div>'+(v.plate?'<div class="vehicle-plate">'+v.plate+'</div>':'')+'</div></div></div>'
    +(mf.length?'<div class="card"><div class="card-header"><span class="card-icon">📋</span><span class="card-title">Datos del vehículo</span></div><div class="card-body">'+mf.map(([val,k,cls])=>'<div class="info-row"><span class="info-key">'+k+'</span><span class="info-val '+cls+'">'+val+'</span></div>').join('')+'</div></div>':'')
    +(cr?'<div class="card"><div class="card-header"><span class="card-icon">⚙️</span><span class="card-title">Información adicional</span></div><div class="card-body">'+cr+'</div></div>':'')
    +(v.notes?'<div class="card"><div class="card-header"><span class="card-icon">📝</span><span class="card-title">Notas</span></div><div class="card-body"><div class="notes-block">'+v.notes+'</div></div></div>':'')
    +'<div class="card"><div class="card-header"><span class="card-icon">📅</span><span class="card-title">Registro</span></div><div class="card-body"><div class="info-row"><span class="info-key">REGISTRADO</span><span class="info-val mono">'+(v.created||'—')+'</span></div><div class="info-row"><span class="info-key">ID</span><span class="info-val mono" style="font-size:11px;color:var(--muted)">'+v.id+'</span></div></div></div>'
    +'<div class="footer">FLEETQR · <span>verificado</span> · '+new Date().toLocaleDateString('es-PY')+'</div>';}
function nf(t,s){return '<div class="not-found"><div class="not-found-icon">🔍</div><div class="not-found-title">'+t+'</div><div class="not-found-sub">'+s+'</div></div>';}
render();
</script>
</body>
</html>
